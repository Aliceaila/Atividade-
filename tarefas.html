<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciamento de Tarefas - Abas por Status</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    body { background: linear-gradient(180deg, #f8f4ff 0%, #ffffff 250px); }
    .navbar-custom { background-color: #6f42c1; }
    .nav-tabs .nav-link.active { font-weight: 600; border-bottom: 3px solid #6f42c1; }
    .nav-tabs .nav-link { color: #495057; }
    table.tabela-status thead { display: none; }
    td.descricao { max-width: 360px; }
  </style>
</head>
<body>

  <nav class="navbar navbar-custom navbar-dark mb-4">
    <div class="container">
      <span class="navbar-brand"><i class="bi bi-list-check"></i> Sistema de Gerenciamento de Tarefas</span>
      <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#modalTarefa" onclick="novaTarefa()">
        <i class="bi bi-plus-lg"></i> Nova Tarefa
      </button>
    </div>
  </nav>

  <div class="container">
    <ul class="nav nav-tabs mb-3" id="abasStatus" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#aba-afazer" type="button">
          A Fazer <span class="badge bg-primary ms-1" id="contA">0</span>
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#aba-progresso" type="button">
          Em Progresso <span class="badge bg-warning text-dark ms-1" id="contP">0</span>
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#aba-concluido" type="button">
          Concluído <span class="badge bg-success ms-1" id="contC">0</span>
        </button>
      </li>
    </ul>

    <div class="tab-content">
      <div class="tab-pane fade show active" id="aba-afazer">
        <table class="table table-hover tabela-status bg-white shadow-sm">
          <thead><tr><th>Título</th><th>Descrição</th><th>Data</th><th></th></tr></thead>
          <tbody id="tabela-A Fazer"></tbody>
        </table>
        <p class="text-muted text-center vazio-A-Fazer d-none">Nenhuma tarefa nesta lista.</p>
      </div>
      <div class="tab-pane fade" id="aba-progresso">
        <table class="table table-hover tabela-status bg-white shadow-sm">
          <thead><tr><th>Título</th><th>Descrição</th><th>Data</th><th></th></tr></thead>
          <tbody id="tabela-Em Progresso"></tbody>
        </table>
        <p class="text-muted text-center vazio-Em-Progresso d-none">Nenhuma tarefa nesta lista.</p>
      </div>
      <div class="tab-pane fade" id="aba-concluido">
        <table class="table table-hover tabela-status bg-white shadow-sm">
          <thead><tr><th>Título</th><th>Descrição</th><th>Data</th><th></th></tr></thead>
          <tbody id="tabela-Concluído"></tbody>
        </table>
        <p class="text-muted text-center vazio-Concluído d-none">Nenhuma tarefa nesta lista.</p>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="modalTarefa" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="formTarefa">
          <div class="modal-header" style="background-color:#f3ecff;">
            <h5 class="modal-title" id="modalTituloLabel">Nova Tarefa</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="tarefaId">
            <div class="mb-3">
              <label class="form-label">Título</label>
              <input type="text" class="form-control" id="tituloTarefa" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Descrição</label>
              <textarea class="form-control" id="descricaoTarefa" rows="3"></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Status</label>
              <select class="form-select" id="statusTarefa">
                <option value="A Fazer">A Fazer</option>
                <option value="Em Progresso">Em Progresso</option>
                <option value="Concluído">Concluído</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn" style="background-color:#6f42c1; color:#fff;">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    /*
      class Tarefa {
        int id
        string titulo
        string descricao
        string status   // A Fazer | Em Progresso | Concluído
        Date dataCriacao
      }
    */

    let tarefas = [];
    let proximoId = 1;
    const statusList = ["A Fazer", "Em Progresso", "Concluído"];

    function formatarData(data) { return data.toLocaleDateString('pt-BR'); }

    function renderizarAbas() {
      statusList.forEach(status => {
        const corpo = document.getElementById(`tabela-${status}`);
        corpo.innerHTML = '';
        const doStatus = tarefas.filter(t => t.status === status);

        const slugVazio = status.replace(/\s+/g, '-');
        const msgVazio = document.querySelector(`.vazio-${slugVazio}`);

        if (doStatus.length === 0) {
          msgVazio.classList.remove('d-none');
        } else {
          msgVazio.classList.add('d-none');
          doStatus.forEach(tarefa => {
            const linha = document.createElement('tr');
            linha.innerHTML = `
              <td class="fw-semibold">${tarefa.titulo}</td>
              <td class="descricao">${tarefa.descricao || '<span class="text-muted">—</span>'}</td>
              <td>${formatarData(tarefa.dataCriacao)}</td>
              <td class="text-end">
                <button class="btn btn-sm btn-outline-secondary me-1" onclick="editarTarefa(${tarefa.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="excluirTarefa(${tarefa.id})"><i class="bi bi-trash"></i></button>
              </td>
            `;
            corpo.appendChild(linha);
          });
        }
      });

      document.getElementById('contA').textContent = tarefas.filter(t => t.status === 'A Fazer').length;
      document.getElementById('contP').textContent = tarefas.filter(t => t.status === 'Em Progresso').length;
      document.getElementById('contC').textContent = tarefas.filter(t => t.status === 'Concluído').length;
    }

    function novaTarefa() {
      document.getElementById('formTarefa').reset();
      document.getElementById('tarefaId').value = '';
      document.getElementById('modalTituloLabel').textContent = 'Nova Tarefa';
    }

    function editarTarefa(id) {
      const tarefa = tarefas.find(t => t.id === id);
      if (!tarefa) return;
      document.getElementById('tarefaId').value = tarefa.id;
      document.getElementById('tituloTarefa').value = tarefa.titulo;
      document.getElementById('descricaoTarefa').value = tarefa.descricao;
      document.getElementById('statusTarefa').value = tarefa.status;
      document.getElementById('modalTituloLabel').textContent = 'Editar Tarefa';
      new bootstrap.Modal(document.getElementById('modalTarefa')).show();
    }

    function excluirTarefa(id) {
      if (confirm('Deseja realmente excluir esta tarefa?')) {
        tarefas = tarefas.filter(t => t.id !== id);
        renderizarAbas();
      }
    }

    document.getElementById('formTarefa').addEventListener('submit', function (e) {
      e.preventDefault();
      const id = document.getElementById('tarefaId').value;
      const titulo = document.getElementById('tituloTarefa').value.trim();
      const descricao = document.getElementById('descricaoTarefa').value.trim();
      const status = document.getElementById('statusTarefa').value;
      if (!titulo) return;

      if (id) {
        const tarefa = tarefas.find(t => t.id === parseInt(id));
        Object.assign(tarefa, { titulo, descricao, status });
      } else {
        tarefas.push({ id: proximoId++, titulo, descricao, status, dataCriacao: new Date() });
      }
      renderizarAbas();
      bootstrap.Modal.getInstance(document.getElementById('modalTarefa')).hide();
    });

    tarefas.push(
      { id: proximoId++, titulo: 'Criar wireframe do sistema', descricao: 'Layout inicial com navegação e quadro Kanban', status: 'Concluído', dataCriacao: new Date('2026-05-28') },
      { id: proximoId++, titulo: 'Implementar formulário de tarefas', descricao: 'Formulário para adicionar novas tarefas', status: 'Em Progresso', dataCriacao: new Date('2026-05-28') },
      { id: proximoId++, titulo: 'Adicionar drag and drop', descricao: 'Mover tarefas entre colunas', status: 'A Fazer', dataCriacao: new Date('2026-05-28') }
    );

    renderizarAbas();
  </script>
</body>
</html>
